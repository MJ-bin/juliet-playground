repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: python -m ruff format
        language: system
        types_or: [python]

      - id: ruff-check
        name: ruff-check
        entry: python -m ruff check
        language: system
        types_or: [python]

      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
