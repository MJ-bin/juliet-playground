[tool.pytest.ini_options]
testpaths = ['tests']

[tool.ruff]
target-version = 'py39'
line-length = 100
force-exclude = true
extend-exclude = [
  'artifacts',
  'downloads',
  'experiments',
  'juliet-test-suite-v1.3',
]

[tool.ruff.lint]
select = ['E', 'F', 'I']
ignore = ['E501']

[tool.ruff.format]
quote-style = 'single'
